<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Linux.do 归档助手</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f3f4f6;
        --panel: #ffffff;
        --border: #d1d5db;
        --text: #111827;
        --muted: #6b7280;
        --primary: #111827;
        --primary-soft: #e5e7eb;
        --success: #047857;
        --warning: #b45309;
        --danger: #b91c1c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .wrap {
        width: 360px;
        padding: 14px;
      }

      .header {
        margin-bottom: 10px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 16px;
      }

      .sub {
        font-size: 12px;
        line-height: 1.5;
        color: var(--muted);
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px;
        margin-bottom: 10px;
      }

      .status-row,
      .option-row,
      .range-row,
      .meta-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .status-row,
      .option-row,
      .meta-row {
        margin-bottom: 8px;
      }

      .status-row:last-child,
      .option-row:last-child,
      .meta-row:last-child {
        margin-bottom: 0;
      }

      .label,
      .meta-label {
        font-size: 12px;
        color: #374151;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 12px;
        font-weight: 600;
        background: var(--primary-soft);
        color: #1f2937;
      }

      .badge.online {
        background: #d1fae5;
        color: var(--success);
      }

      .badge.offline {
        background: #fee2e2;
        color: var(--danger);
      }

      .badge.busy {
        background: #fef3c7;
        color: var(--warning);
      }

      .details {
        margin: 0;
      }

      .details summary {
        cursor: pointer;
        font-size: 12px;
        color: #374151;
        user-select: none;
      }

      .advanced {
        margin-top: 10px;
        display: grid;
        gap: 8px;
      }

      .range-row {
        gap: 8px;
      }

      .range-field {
        flex: 1;
      }

      .range-field label {
        display: block;
        margin-bottom: 4px;
        font-size: 12px;
        color: #374151;
      }

      input[type="number"] {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 12px;
        background: #fff;
        color: var(--text);
      }

      .help {
        font-size: 12px;
        color: var(--muted);
        line-height: 1.5;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 13px;
        cursor: pointer;
      }

      .primary-btn {
        background: var(--primary);
        color: #fff;
      }

      .secondary-btn {
        margin-top: 8px;
        background: #fff;
        border: 1px solid var(--border);
        color: var(--text);
      }

      button:disabled,
      input:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .progress-wrap {
        margin: 10px 0 8px;
      }

      .progress-track {
        width: 100%;
        height: 10px;
        border-radius: 999px;
        background: #e5e7eb;
        overflow: hidden;
      }

      .progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #111827, #4b5563);
        transition: width 0.25s ease;
      }

      .status-title {
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 4px;
      }

      .status-meta,
      .log {
        font-size: 12px;
        color: var(--muted);
        line-height: 1.6;
        white-space: pre-wrap;
      }

      .log {
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <h1>Linux.do 归档助手</h1>
        <div class="sub">导出当前帖子到本地 Markdown / PDF，适合个人归档与 AI 上下文整理。</div>
      </div>

      <div class="card">
        <div class="status-row">
          <span class="label">本地桥状态</span>
          <span id="bridgeBadge" class="badge">检测中</span>
        </div>
        <div id="bridgeHint" class="help">使用前请先启动本地桥：`uv run python .\local_bridge_server.py`</div>
      </div>

      <div class="card">
        <div class="option-row">
          <label class="label" for="enablePdf">同时生成 PDF</label>
          <input id="enablePdf" type="checkbox" checked />
        </div>

        <details id="advancedPanel" class="details">
          <summary>高级选项</summary>
          <div class="advanced">
            <div class="range-row">
              <div class="range-field">
                <label for="postStart">起始楼层</label>
                <input id="postStart" type="number" inputmode="numeric" min="1" placeholder="留空=从 1 开始" />
              </div>
              <div class="range-field">
                <label for="postEnd">结束楼层</label>
                <input id="postEnd" type="number" inputmode="numeric" min="1" placeholder="留空=到最后一楼" />
              </div>
            </div>
            <div class="help">留空表示导出整帖。只想截取某个楼层区间时再填写。</div>
          </div>
        </details>
      </div>

      <button id="exportBtn" class="primary-btn">导出当前帖子</button>
      <button id="openFolderBtn" class="secondary-btn" disabled>打开最近一次输出目录</button>

      <div class="card progress-wrap">
        <div class="meta-row">
          <span class="meta-label">进度</span>
          <span id="progressText" class="meta-label">0%</span>
        </div>
        <div class="progress-track">
          <div id="progressBar" class="progress-bar"></div>
        </div>
        <div id="statusTitle" class="status-title">准备就绪</div>
        <div id="statusMeta" class="status-meta">打开一个 Linux.do 帖子后，点击上方按钮开始导出。</div>
        <div id="log" class="log"></div>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
